<!DOCTYPE html>
<html>

<head>

<title>PhysLab - Ball Trajectory Tracker</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#111;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
width:750px;
margin:auto;
margin-top:40px;
background:#151515;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 20px rgba(0,0,0,0.6);
}

button{
padding:12px 22px;
margin:10px;
border:none;
border-radius:6px;
background:#2196f3;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1976d2;
}

.section{
margin-top:35px;
}

.slider{
width:350px;
}

#plot{
margin-top:20px;
border-radius:8px;
}

.colorPreview{
width:60px;
height:60px;
border-radius:50%;
margin:auto;
margin-top:10px;
border:3px solid white;
}

</style>

</head>

<body>

<header>
PhysLab – Optical Ball Trajectory Tracker
</header>

<div class="container">

<h2>Upload Ball Motion Video</h2>

<input type="file" id="videoFile" accept="video/*">

<br>

<button onclick="uploadVideo()">Analyze Trajectory</button>

<br><br>

<img id="plot" width="650">

<div class="section">

<h3>HSV Calibration</h3>

<p>Adjust the sliders and watch the preview color.</p>

Lower H<br>
<input class="slider" type="range" min="0" max="179" id="lh" oninput="updatePreview()"><br>

Lower S<br>
<input class="slider" type="range" min="0" max="255" id="ls" oninput="updatePreview()"><br>

Lower V<br>
<input class="slider" type="range" min="0" max="255" id="lv" oninput="updatePreview()"><br>

Upper H<br>
<input class="slider" type="range" min="0" max="179" id="uh" value="20"><br>

Upper S<br>
<input class="slider" type="range" min="0" max="255" id="us" value="255"><br>

Upper V<br>
<input class="slider" type="range" min="0" max="255" id="uv" value="255"><br>

<div class="colorPreview" id="colorCircle"></div>

<button onclick="updateHSV()">Update Color Range</button>

</div>

<div class="section">

<h3>Rocket Physics Simulator</h3>

<a href="/simulator">
<button>Open Rocket Trajectory Simulator</button>
</a>

</div>

</div>

<script>

function uploadVideo(){

let file=document.getElementById("videoFile").files[0]

if(!file){

alert("Please upload a video first")

return

}

let form=new FormData()

form.append("video",file)

fetch("/process_video",{

method:"POST",

body:form

})

.then(res=>res.json())

.then(data=>{

if(data.plot){

document.getElementById("plot").src=
"data:image/png;base64,"+data.plot

}

})

}

function updateHSV(){

fetch("/update_hsv",{

method:"POST",

headers:{
'Content-Type':'application/x-www-form-urlencoded'
},

body:

"lh="+lh.value+
"&ls="+ls.value+
"&lv="+lv.value+
"&uh="+uh.value+
"&us="+us.value+
"&uv="+uv.value

})

}


function hsvToRgb(h, s, v){

s/=255
v/=255

let c = v*s
let x = c*(1-Math.abs((h/30)%2-1))
let m = v-c

let r=0,g=0,b=0

if(h<30){r=c;g=x;b=0}
else if(h<60){r=x;g=c;b=0}
else if(h<90){r=0;g=c;b=x}
else if(h<120){r=0;g=x;b=c}
else if(h<150){r=x;g=0;b=c}
else{r=c;g=0;b=x}

r=Math.round((r+m)*255)
g=Math.round((g+m)*255)
b=Math.round((b+m)*255)

return [r,g,b]

}


function updatePreview(){

let h=parseInt(document.getElementById("lh").value)
let s=parseInt(document.getElementById("ls").value)
let v=parseInt(document.getElementById("lv").value)

let rgb=hsvToRgb(h,s,v)

document.getElementById("colorCircle").style.backgroundColor =
`rgb(${rgb[0]},${rgb[1]},${rgb[2]})`

}

updatePreview()

</script>

</body>
</html>
