<!DOCTYPE html>
<html>

<head>

<title>Rocket Simulator</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#111;
padding:20px;
font-size:28px;
}

.container{
width:700px;
margin:auto;
margin-top:40px;
background:#151515;
padding:30px;
border-radius:10px;
}

.slider{
width:350px;
}

button{
padding:12px 20px;
border:none;
background:#4caf50;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#388e3c;
}

</style>

</head>

<body>

<header>
Rocket Trajectory Simulator
</header>

<div class="container">

Mass <br>
<input class="slider" type="range" id="mass" min="100" max="2000" value="500"><br><br>

Fuel <br>
<input class="slider" type="range" id="fuel" min="100" max="2000" value="400"><br><br>

Burn Rate <br>
<input class="slider" type="range" id="burn" min="1" max="50" value="10"><br><br>

Thrust <br>
<input class="slider" type="range" id="thrust" min="1000" max="50000" value="20000"><br><br>

Drag <br>
<input class="slider" type="range" id="drag" min="0" max="1" step="0.01" value="0.3"><br><br>

Viscosity <br>
<input class="slider" type="range" id="viscosity" min="0" max="1" step="0.01" value="0.1"><br><br>

Angle <br>
<input class="slider" type="range" id="angle" min="0" max="90" value="80"><br><br>

<button onclick="simulate()">Run Simulation</button>

<br><br>

<img id="plot" width="600">

<br><br>

<a href="/">
<button>Back to Tracker</button>
</a>

</div>

<script src="/static/simulator.js"></script>

</body>
</html>
