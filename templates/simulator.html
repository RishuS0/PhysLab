<!DOCTYPE html>
<html>

<head>

<title>Rocket Simulator</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

input{
width:300px;
}

</style>

</head>

<body>

<h2>Rocket Trajectory Simulator</h2>

Mass <input type="range" id="mass" min="100" max="2000" value="500"><br>
Fuel <input type="range" id="fuel" min="100" max="2000" value="400"><br>
Burn Rate <input type="range" id="burn" min="1" max="50" value="10"><br>
Thrust <input type="range" id="thrust" min="1000" max="50000" value="20000"><br>
Drag <input type="range" id="drag" min="0" max="1" step="0.01" value="0.3"><br>
Viscosity <input type="range" id="viscosity" min="0" max="1" step="0.01" value="0.1"><br>
Angle <input type="range" id="angle" min="0" max="90" value="80"><br>

<br><br>

<button onclick="simulate()">Run Simulation</button>

<br><br>

<img id="plot">

<script src="/static/simulator.js"></script>

</body>

</html>
