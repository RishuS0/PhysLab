<!DOCTYPE html>
<html>

<head>

<title>Rocket Trajectory Simulator</title>

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

header{
background:#111;
padding:20px;
font-size:28px;
}

.container{
width:900px;
margin:auto;
margin-top:40px;
background:#151515;
padding:30px;
border-radius:10px;
}

.slider{
width:350px;
}

#plot{
margin-top:30px;
}

button{
padding:12px 20px;
border:none;
background:#4caf50;
color:white;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#388e3c;
}

</style>

</head>

<body>

<header>
Rocket Trajectory Simulator
</header>

<div class="container">

<h3>Rocket Parameters</h3>

Mass<br>
<input class="slider" type="range" id="mass" min="50" max="2000" value="500"><br><br>

Fuel Mass<br>
<input class="slider" type="range" id="fuel" min="50" max="2000" value="300"><br><br>

Burn Rate<br>
<input class="slider" type="range" id="burn" min="1" max="50" value="10"><br><br>

Thrust<br>
<input class="slider" type="range" id="thrust" min="1000" max="50000" value="20000"><br><br>

Drag<br>
<input class="slider" type="range" id="drag" min="0" max="1" step="0.01" value="0.3"><br><br>

Viscosity<br>
<input class="slider" type="range" id="viscosity" min="0" max="1" step="0.01" value="0.1"><br><br>

Launch Angle<br>
<input class="slider" type="range" id="angle" min="0" max="90" value="80"><br><br>

Azimuth Direction<br>
<input class="slider" type="range" id="azimuth" min="0" max="360" value="0"><br><br>

<button onclick="simulate()">Run Simulation</button>

<br><br>

<div id="plot"></div>

<br>

<a href="/">
<button>Back to Tracker</button>
</a>

</div>

<script>

function simulate(){

let mass = parseFloat(document.getElementById("mass").value)
let fuel = parseFloat(document.getElementById("fuel").value)
let burn = parseFloat(document.getElementById("burn").value)
let thrust = parseFloat(document.getElementById("thrust").value)
let drag = parseFloat(document.getElementById("drag").value)
let viscosity = parseFloat(document.getElementById("viscosity").value)
let angle = parseFloat(document.getElementById("angle").value)
let azimuth = parseFloat(document.getElementById("azimuth").value)

let g = 9.81
let rho = 1.225
let area = 0.3
let dt = 0.05

let x=0,y=0,z=0
let vx=0,vy=0,vz=0

let X=[],Y=[],Z=[]

while(z>=0){

let total_mass = mass + fuel

if(fuel>0){
fuel -= burn*dt
}

let v = Math.sqrt(vx*vx + vy*vy + vz*vz)

let drag_force = 0.5*rho*drag*area*v*v
drag_force *= (1+viscosity)

let theta = angle*Math.PI/180
let phi = azimuth*Math.PI/180

let thrust_x = thrust*Math.cos(theta)*Math.cos(phi)
let thrust_y = thrust*Math.cos(theta)*Math.sin(phi)
let thrust_z = thrust*Math.sin(theta)

let ax = thrust_x/total_mass
let ay = thrust_y/total_mass
let az = thrust_z/total_mass - g

vx += ax*dt
vy += ay*dt
vz += az*dt

x += vx*dt
y += vy*dt
z += vz*dt

X.push(x)
Y.push(y)
Z.push(z)

if(X.length>10000) break
}

let trace = {
x:X,
y:Y,
z:Z,
mode:'lines',
type:'scatter3d',
line:{width:6,color:'red'}
}

let layout = {
scene:{
xaxis:{title:'X Distance'},
yaxis:{title:'Y Distance'},
zaxis:{title:'Altitude'}
},
paper_bgcolor:"#151515",
font:{color:"white"}
}

Plotly.newPlot('plot',[trace],layout)

}

simulate()

</script>

</body>
</html>
